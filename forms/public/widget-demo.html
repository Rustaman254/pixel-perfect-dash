<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Site - Checkout Demo</title>
    <script src="/ripplify-widget.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; text-align: center; background: #f8fafc; }
        .product-card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 400px; margin: 0 auto; }
        .price { font-size: 24px; font-weight: bold; color: #025864; margin: 16px 0; }
        button { background: #025864; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>Merchant Site Demo</h1>
    <p>This is an example of an external website integrating Ripplify.</p>

    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Product" style="width: 100%; border-radius: 12px; margin-bottom: 16px;">
        <h2>Premium Wireless Headphones</h2>
        <p class="price">KES 15,000</p>
        <button onclick="Ripplify.open('premium-wireless-headphones-abcde')">
            Pay with Ripplify Escrow
        </button>
    </div>

    <script>
        // In a real scenario, the merchant would first call the Ripplify Checkout API 
        // to get a dynamic slug, then pass it to Ripplify.open()
        console.log("Ripplify Widget Loaded:", !!window.Ripplify);
    </script>
</body>
</html>
