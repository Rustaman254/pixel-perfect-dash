# Sokostack Ecosystem - Nginx Configuration with SSL (Let's Encrypt)
# Place this in /etc/nginx/sites-enabled/ecosystem.conf
# SSL certs managed by Certbot

# Upstream backends
upstream auth_backend      { server 127.0.0.1:3001; }
upstream ripplify_backend  { server 127.0.0.1:3002; }
upstream shopalize_backend { server 127.0.0.1:3003; }
upstream watchtower_backend{ server 127.0.0.1:3004; }
upstream admin_backend     { server 127.0.0.1:3005; }

# Upstream frontends (served by Vite preview or built static files)
upstream ripplify_frontend  { server 127.0.0.1:8080; }
upstream shopalize_frontend { server 127.0.0.1:8081; }
upstream watchtower_frontend{ server 127.0.0.1:8082; }
upstream admin_frontend     { server 127.0.0.1:8083; }

# ============================================================
# HTTP → HTTPS redirect (all subdomains)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name *.sokostack.xyz sokostack.xyz;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# AUTH SERVICE - auth.sokostack.xyz
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.sokostack.xyz;

    ssl_certificate     /etc/letsencrypt/live/sokostack.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokostack.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# RIPPLIFY - ripplify.sokostack.xyz
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ripplify.sokostack.xyz;

    ssl_certificate     /etc/letsencrypt/live/sokostack.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokostack.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Auth routes → auth service
    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth routes → auth service
    location /api/oauth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
    }

    # SSO hub → auth service
    location /sso.html {
        proxy_pass http://auth_backend;
    }

    # Ripplify API routes → ripplify service
    location /api/ {
        proxy_pass http://ripplify_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public payment pages
    location /pay/ {
        proxy_pass http://ripplify_frontend;
        proxy_set_header Host $host;
    }

    # Frontend SPA
    location / {
        proxy_pass http://ripplify_frontend;
        proxy_set_header Host $host;
    }
}

