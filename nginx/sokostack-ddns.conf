# Sokostack Ecosystem - Nginx Configuration

upstream auth_backend      { server 127.0.0.1:3006; }
upstream ripplify_backend  { server 127.0.0.1:3007; }
upstream server_backend    { server 127.0.0.1:3001; }

server {
    server_name sokostack.ddns.net;

    client_max_body_size 10m;

    # Auth routes -> auth service
    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other routes -> main server
    location / {
        proxy_pass http://server_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90;
        proxy_send_timeout 90;
        proxy_connect_timeout 90;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sokostack.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokostack.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
