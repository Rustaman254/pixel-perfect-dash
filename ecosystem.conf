# Sokostack Ecosystem - Nginx Configuration with SSL (Let's Encrypt)
# Place this in /etc/nginx/sites-enabled/ecosystem.conf
# SSL certs managed by Certbot

# Upstream backends
upstream auth_backend      { server 127.0.0.1:3006; }
upstream ripplify_backend  { server 127.0.0.1:3007; }
upstream shopalize_backend { server 127.0.0.1:3008; }
upstream watchtower_backend{ server 127.0.0.1:3009; }
upstream admin_backend     { server 127.0.0.1:3010; }

# Upstream frontends (served by Vite preview or built static files)
upstream ripplify_frontend  { server 127.0.0.1:8080; }
upstream shopalize_frontend { server 127.0.0.1:8081; }
upstream watchtower_frontend{ server 127.0.0.1:8082; }
upstream admin_frontend     { server 127.0.0.1:8083; }

# ============================================================
# HTTP → HTTPS redirect (all subdomains)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name *.sokostack.xyz sokostack.xyz *.sokostack.ddns.net sokostack.ddns.net;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# SOKOSTACK.DDNS.NET - Main domain
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sokostack.ddns.net;

    ssl_certificate     /etc/letsencrypt/live/sokostack.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokostack.ddns.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Auth routes → auth service
    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://ripplify.sokostack.xyz' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-app-name, X-Internal-API-Key, Accept, Origin' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 1728000;
            return 204;
        }
    }

    # Legacy API routes (/api/apps, /api/payouts, etc.) → old server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90;
        proxy_send_timeout 90;
        proxy_connect_timeout 90;
        
        # CORS preflight only (not for all responses - that causes duplicates)
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://ripplify.sokostack.xyz' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, x-app-name, X-Internal-API-Key, Accept, Origin' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 1728000;
            return 204;
        }
    }

    # All other routes → ripplify frontend/service
    location / {
        proxy_pass http://ripplify_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90;
        proxy_send_timeout 90;
        proxy_connect_timeout 90;
    }
}

# ============================================================
# AUTH SERVICE - auth.sokostack.xyz
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.sokostack.xyz;

    ssl_certificate     /etc/letsencrypt/live/auth.sokostack.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.sokostack.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle CORS preflight - allow ripplify.sokostack.xyz and auth.sokostack.xyz
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://ripplify.sokostack.xyz' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With, Accept, Origin' always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Allow cross-origin for sso.html
        add_header Access-Control-Allow-Origin 'https://ripplify.sokostack.xyz' always;
    }
}

# ============================================================
# RIPPLIFY - ripplify.sokostack.xyz
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ripplify.sokostack.xyz;

    ssl_certificate     /etc/letsencrypt/live/ripplify.sokostack.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ripplify.sokostack.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Auth routes → auth service
    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth routes → auth service
    location /api/oauth/ {
        proxy_pass http://auth_backend;
        proxy_set_header Host $host;
    }

    # SSO hub → auth service
    location /sso.html {
        proxy_pass http://auth_backend;
    }

    # Ripplify API routes → ripplify service
    location /api/ {
        proxy_pass http://ripplify_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle CORS preflight only
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://ripplify.sokostack.xyz' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With, Accept, Origin, x-app-name' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # Public payment pages
    location /pay/ {
        proxy_pass http://ripplify_frontend;
        proxy_set_header Host $host;
    }

    # Frontend SPA
    location / {
        proxy_pass http://ripplify_frontend;
        proxy_set_header Host $host;
    }
}

